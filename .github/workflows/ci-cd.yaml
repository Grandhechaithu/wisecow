name: Wisecow CI/CD Pipeline
 
on:
  push:
    branches:
      - main                           # Trigger on push to main
 
env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/wisecow
 
jobs:
  # ────────────────────────────────────────
  # JOB 1: Build and Push Docker Image
  # ────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
 
    steps:
      # Step 1: Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # Step 2: Set up Docker Buildx (multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      # Step 3: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
 
      # Step 4: Extract metadata (tags, labels)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-            # Tag with commit SHA (e.g. sha-abc1234)
            type=raw,value=latest            # Always update :latest tag
 
      # Step 5: Build and push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha              # Use GitHub Actions cache
          cache-to: type=gha,mode=max
 
  # ────────────────────────────────────────
  # JOB 2: Deploy to Kubernetes [Challenge Goal]
  # ────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push              # Only runs after successful build
 
    steps:
      # Step 1: Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # Step 2: Set up kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
 
      # Step 3: Configure kubeconfig from GitHub Secret
      - name: Configure Kubernetes credentials
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
 
      # Step 4: Update image tag in deployment to use new SHA
      - name: Update image in deployment
        run: |
          IMAGE_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          kubectl set image deployment/wisecow-deployment \
            wisecow=${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
            --record
 
      # Step 5: Verify rollout
      - name: Verify deployment rollout
        run: |
          kubectl rollout status deployment/wisecow-deployment --timeout=120s