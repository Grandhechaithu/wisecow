apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wisecow-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"      # Force HTTPS
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - wisecow.local                # Your domain / Minikube hostname
      secretName: wisecow-tls          # References the TLS secret
  rules:
    - host: wisecow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wisecow-service
                port:
                  number: 80